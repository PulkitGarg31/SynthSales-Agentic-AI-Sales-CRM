# SynthSales — full stack on an Oracle A1 VM (arm64).
# From this directory:  docker compose up -d --build
#
# Only Caddy publishes ports (80/443). db/redis/api are reachable only on the
# internal compose network, so Postgres/Redis are never exposed to the internet.
# Caddy terminates TLS (free Let's Encrypt cert for the DuckDNS host) and
# reverse-proxies to the api on :8000.
services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: synthsales
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: synthsales
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synthsales"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always

  api:
    build:
      context: ../../backend
    restart: always
    env_file:
      - ./.env
    environment:
      PORT: "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  caddy:
    image: caddy:2
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pgdata:
  caddy_data:
  caddy_config:
